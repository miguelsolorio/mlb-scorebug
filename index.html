<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB Scorebug</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    (function() {
      const stored = localStorage.getItem('theme');
      if (stored) {
        document.documentElement.setAttribute('data-theme', stored);
      } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body>
  <div class="app">
    <!-- Scorebug -->
    <div class="scorebug" id="scorebug">
      <!-- Teams & Score -->
      <div class="scorebug-main">
        <div class="team-card" id="away-row">
          <div class="team-color-bar" id="away-color-bar"></div>
          <img class="team-logo" id="away-logo" src="https://www.mlbstatic.com/team-logos/136.svg" alt="SEA">
          <div class="team-card-inner">
            <span class="team-abbr" id="away-abbr">SEA</span>
            <span class="team-player" id="away-player"></span>
          </div>
          <div class="team-right">
            <span class="team-score" id="away-score">0</span>
            <span class="team-stat" id="away-stat"></span>
          </div>
        </div>
        <div class="divider-v"></div>
        <div class="team-card" id="home-row">
          <div class="team-color-bar" id="home-color-bar"></div>
          <img class="team-logo" id="home-logo" src="https://www.mlbstatic.com/team-logos/141.svg" alt="TOR">
          <div class="team-card-inner">
            <span class="team-abbr" id="home-abbr">TOR</span>
            <span class="team-player" id="home-player"></span>
          </div>
          <div class="team-right">
            <span class="team-score" id="home-score">0</span>
            <span class="team-stat" id="home-stat"></span>
          </div>
        </div>
      </div>

      <!-- Game Info Panel -->
      <div class="scorebug-info">
        <!-- Inning -->
        <div class="inning-block">
          <div class="inning-arrow" id="inning-arrow">
            <svg width="10" height="6" viewBox="0 0 10 6" id="arrow-svg">
              <polygon points="5,0 10,6 0,6" fill="currentColor"/>
            </svg>
          </div>
          <span class="inning-number" id="inning-number">1</span>
        </div>

        <!-- Count & Outs -->
        <div class="count-block">
          <span class="count-text" id="count-text">0-0</span>
          <div class="outs-dots" id="outs">
            <span class="dot"></span><span class="dot"></span>
          </div>
        </div>

        <!-- Bases -->
        <div class="bases-block">
          <svg class="bases-diamond" viewBox="0 0 52 52" width="52" height="52">
            <rect id="base-2" class="base" x="18.5" y="1" width="15" height="15" rx="2" transform="rotate(45 26 8.5)"/>
            <rect id="base-3" class="base" x="1" y="18.5" width="15" height="15" rx="2" transform="rotate(45 8.5 26)"/>
            <rect id="base-1" class="base" x="36" y="18.5" width="15" height="15" rx="2" transform="rotate(45 43.5 26)"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Simulator Controls -->
    <div class="controls">
      <h2 class="controls-title">Game Simulator</h2>
      <div class="controls-row">
        <button class="btn btn-primary" id="btn-play">
          <svg class="btn-icon" id="play-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <polygon points="6,4 20,12 6,20"/>
          </svg>
          <svg class="btn-icon hidden" id="pause-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/>
          </svg>
          <span id="play-label">Play</span>
        </button>
        <button class="btn btn-secondary" id="btn-next">Next Pitch</button>
        <button class="btn btn-danger" id="btn-reset">Reset</button>
      </div>
      <div class="controls-row">
        <label class="speed-label" for="speed-range">Speed</label>
        <input type="range" id="speed-range" min="1" max="10" value="5" class="speed-slider">
        <span class="speed-value" id="speed-value">5x</span>
      </div>
      <details class="game-log-details">
        <summary class="game-log-summary">Play-by-Play</summary>
        <div class="game-log" id="game-log">
          <div class="log-entry log-info">Press Play or Next Pitch to start the simulation.</div>
        </div>
      </details>
    </div>
  </div>

  <!-- Theme toggle -->
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <script src="simulator.js"></script>
</body>
</html>
